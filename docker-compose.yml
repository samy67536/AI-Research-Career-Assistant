# docker-compose.yml
version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: ai_assistant_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - DATABASE_URL=sqlite:///./data/app.db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: ai_assistant_frontend
    ports:
      - "8501:8501"
    volumes:
      - ./.env:/app/.env
      - ./data:/app/data
    depends_on:
      - backend
    restart: unless-stopped
